<!-- finances/templates/finances/edit_transacation.html -->
{% extends "base.html" %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}
<h2>Edit Transaction</h2>

<form method="POST">
    {% csrf_token %}

    <label for="date">Date:</label>
    <input type="date" id="date" name="date" value="{{ entry.date|date:'Y-m-d'|default:'' }}">

    <label for="name">Transaction Name:</label>
    <input type="text" id="name" name="name" value="{{ entry.name }}">

    <label for="amount">Amount:</label>
    <input type="text" id="amount" name="amount" value="{{ entry.amount }}">

    <label for="entry_type">Type:</label>
    <select id="entry_type" name="entry_type">
        {% for key, label in entry_types %}
            <option value="{{ key }}"
                {% if entry.entry_type == key %}
                    selected
                {% endif %}>
            {{ label }}
        </option>
    {% endfor %}
</select>

    <label for="category">Category:</label>
    <select id="category" name="category">
        <option value="">Select from the dropdown</option>
            {% for category in categories %}
                <option value="{{ category.id }}"
                    {% if entry.category and entry.category.id == category.id %}
                        selected
                    {% endif %}>
                    {{ category.name }}
                </option>
            {% endfor %}
        </select>

    <label for="description">Description:</label>
    <input type="text" id="description" name="description" value="{{ entry.description }}">

    <button type="submit">Save Changes</button>
    <a href="{% url 'view_transactions' %}" style="margin-left: 10px;">Cancel</a>
</form>

{% endblock %}
