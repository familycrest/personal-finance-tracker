<!-- finances/templates/finances/edit_transacations.html -->
{% extends "base.html" %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}
<h2>Edit Transaction</h2>

<form method="POST">
    {% csrf_token %}

    <label for="date">Date:</label>
    <input type="date" id="date" name="date" value="{{ entry.date|date:'Y-m-d'|default:'' }}">

    <label for="name">Transaction Name:</label>
    <input type="text" id="name" name="name" value="{{ entry.name }}">

    <label for="amount">Amount:</label>
    <input type="text" id="amount" name="amount" value="{{ entry.amount }}">

    <label for="entry_type">Type:</label>
    <select id="entry_type" name="entry_type">
        {% for key, label in entry_types %}
            <option value="{{ key }}">
                {% if entry.entry_type == key %}
                    selected
                {% endif %}>
            {{ label }}
        </option>
    {% endfor %}
</select>

    <!-- change the category to allow user to input their selection in placeholder -->
    <label for="category">Category:</label>

    <!-- call category by name instead of object -->
    <input type="text" id="category" name="category"
        placeholder="Enter a category"
        value="{% if entry.category %}{{ entry.category.name }}{% endif %}"
    >

    <label for="description">Description:</label>
    <input type="text" id="description" name="description" value="{{ entry.description }}">

    <button type="submit">Save Changes</button>
    <a href="{% url 'reports' %}" style="margin-left: 10px;">Cancel</a>
</form>

{% endblock %}
