<!-- templates/personal_finance_tracker_app/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- update the stylesheet link above when ready to add CSS to base template. -->
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Home</a> <!--Create navigation bar for home-->

            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a> <!--Create navigation bar for dashboard homepage-->
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>

                <span>Logged in as {{ user.username }}</span>
            {% else %}
                <a href="{% url 'signup' %}">Signup</a>
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
