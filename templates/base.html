<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance Tracker{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: "Roboto Mono", monospace;
    background-color:#f5fed5;
    text-align: center;
}
header {
    background-image: radial-gradient(#54e659 20%, #d0d70d 80%);
    background-color: #54e659;
    color: white;
    padding: 10px 0;
    text-align: center;
}
nav a, nav form button {
    color:rgb(146, 86, 12);
    margin: 0 15px;
    text-decoration: none;
    font-size: 1em;
    font-weight: bold;
    font-family: "Roboto Mono", monospace;
    background: none;
    border: none;
    cursor: pointer;
}
nav a:hover, nav form button:hover {
    text-decoration: underline;
}
#logged-user {
    margin-left: 20px;
    font-size: 1em;
    color: black;
    font-style: italic;
} 
.button {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    background-color: #54e659;
    border: 2px solid black;
    border-radius: 5px;
    font-size: 1.2em;
    font-family: "Roboto Mono", monospace;
    color: rgb(255, 255, 255);
    text-decoration: none;
    border-radius: 5px;
}
.button:hover {
    background-color: rgb(69, 161, 73);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transform: scale(1.1);
    transition: all 0.3s ease;
}
#features {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    list-style-type: none;
}
#features li {
    margin: 10px;
    font-size: 1.2em;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    width: 300px;
}
#features img {
    width: 80px;
    height: 80px;
    margin-right: 30px;
    border: 1px solid #ccc;
    box-shadow: 1px 1px 10px rgba(69, 161, 73, 0.5);
}


/* form styling */
#login-form {
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    width:400px;
    box-shadow: 1px 1px 10px rgba(69, 161, 73, 0.8);
}
#login-form ul {
    list-style-type: none;
    padding: 0;
    padding-left: 20px;
}
#login-form ul li::marker {
    content: "$ ";
    color:#54e659;
    font-weight: bold;
}

#login-form ul, .helptext {
    font-size: 0.8em;
    color: #666;
}

input[type="text"], input[type="password"], input[type="email"] {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: transparent;
}
input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
    border-color: #54e659;
    outline: none;
    background-color: white;
}
</style>

</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Home</a> <!--Create navigation bar for home-->

            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a> <!--Create navigation bar for dashboard homepage-->
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>

                <span id="logged-user">Logged in as {{ user.username }}</span>
            {% else %}
                <a href="{% url 'signup' %}">Signup</a>
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
